
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ajustes dos Pais - Smart TV Kids</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; color: white; }
    </style>
</head>
<body class="min-h-screen p-6 md:p-12 m-0 relative">
<div class="max-w-5xl mx-auto">

    <div class="flex flex-col md:flex-row items-start md:items-center justify-between mb-10 gap-6">
        <div class="flex items-center gap-4">
            <a href="index.html" class="p-3 bg-slate-800 rounded-full hover:bg-slate-700 transition cursor-pointer text-white">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
            </a>
            <h1 class="text-3xl font-bold">Gestão de Canais</h1>
        </div>

        <!-- Botões de Ação -->
        <div class="flex flex-wrap gap-3">
            <button onclick="openResetModal()" class="flex items-center gap-2 bg-red-600 hover:bg-red-500 px-4 py-2 rounded-xl text-sm font-semibold transition">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"></path><polyline points="3 3 3 8 8 8"></polyline></svg>
                Resetar
            </button>
            <button id="btn-export" class="flex items-center gap-2 bg-slate-800 hover:bg-slate-700 border border-slate-600 px-4 py-2 rounded-xl text-sm font-semibold transition">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
                Exportar
            </button>
            <label class="flex items-center gap-2 bg-blue-600 hover:bg-blue-500 px-4 py-2 rounded-xl text-sm font-semibold cursor-pointer transition">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
                Importar JSON
                <input type="file" id="input-import" accept=".json" class="hidden">
            </label>
        </div>
    </div>

    <div id="channels-container" class="grid gap-6"></div>

</div>

<!-- MODAL DE RESET -->
<div id="reset-modal" class="fixed inset-0 z-50 flex items-center justify-center bg-black/80 backdrop-blur-sm opacity-0 pointer-events-none transition-opacity duration-300">
    <div class="bg-slate-800 border border-slate-700 rounded-3xl p-8 max-w-md w-full mx-4 shadow-2xl relative transform scale-95 transition-transform duration-300" id="reset-modal-content">
        <button onclick="closeResetModal()" class="absolute top-4 right-4 text-slate-400 hover:text-white transition">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
        </button>
        <div class="flex justify-center mb-4 text-red-500">
            <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path><line x1="12" y1="9" x2="12" y2="13"></line><line x1="12" y1="17" x2="12.01" y2="17"></line></svg>
        </div>
        <h2 class="text-2xl font-bold text-center mb-2">Opções de Reset</h2>
        <p class="text-slate-400 text-center mb-6 text-sm">Atenção: Estas ações modificarão a grade atual permanentemente.</p>

        <div class="flex flex-col gap-4">
            <button onclick="resetToDefault()" class="w-full bg-slate-700 border border-slate-600 hover:bg-slate-600 text-white font-bold py-3 rounded-xl transition-colors flex items-center justify-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"></path><polyline points="3 3 3 8 8 8"></polyline></svg>
                Restaurar Programação Padrão
            </button>
            <button onclick="clearAllChannels()" class="w-full bg-red-600 hover:bg-red-500 text-white font-bold py-3 rounded-xl transition-colors flex items-center justify-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
                Zerar Todos os Canais
            </button>
        </div>
    </div>
</div>

<script>
    const STORAGE_KEY = 'tvKidsChannels';
    const EDIT_KEY = 'tvKidsCurrentEditChannel';

    document.addEventListener('DOMContentLoaded', () => {
        const container = document.getElementById('channels-container');
        const savedData = localStorage.getItem(STORAGE_KEY);

        if (!savedData) {
            window.location.href = 'index.html';
            return;
        }

        const channels = JSON.parse(savedData);

        channels.forEach(channel => {
            const programCount = channel.programs ? channel.programs.length : 0;
            const card = document.createElement('div');
            card.className = "bg-slate-800 border border-slate-700 rounded-2xl p-6 flex items-center justify-between cursor-pointer hover:bg-slate-750 hover:border-blue-500 transition-all group";
            card.innerHTML = `
                    <div class="flex items-center gap-6">
                        <div class="w-16 h-16 rounded-xl ${channel.color} flex items-center justify-center font-black text-2xl shadow-lg text-white">${channel.id}</div>
                        <div>
                            <h2 class="text-2xl font-bold text-white">${channel.name}</h2>
                            <p class="text-slate-400 mt-1">${programCount} ${programCount === 1 ? 'programa' : 'programas'}</p>
                        </div>
                    </div>
                    <div class="text-slate-500 group-hover:text-blue-400 transition-colors">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"></path><circle cx="12" cy="12" r="3"></circle></svg>
                    </div>
                `;
            card.addEventListener('click', () => {
                localStorage.setItem(EDIT_KEY, channel.id);
                window.location.href = 'schedule.html';
            });
            container.appendChild(card);
        });

        // Exportação
        document.getElementById('btn-export').addEventListener('click', () => {
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(localStorage.getItem(STORAGE_KEY));
            const downloadAnchorNode = document.createElement('a');
            downloadAnchorNode.setAttribute("href", dataStr);
            downloadAnchorNode.setAttribute("download", "tv_kids_backup.json");
            document.body.appendChild(downloadAnchorNode);
            downloadAnchorNode.click();
            downloadAnchorNode.remove();
        });

        // Importação
        document.getElementById('input-import').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const json = JSON.parse(e.target.result);
                    if (Array.isArray(json) && json.length > 0 && json[0].id) {
                        localStorage.setItem(STORAGE_KEY, JSON.stringify(json));
                        location.reload();
                    } else {
                        alert("Arquivo JSON inválido.");
                    }
                } catch (err) { alert("Erro ao ler o arquivo."); }
            };
            reader.readAsText(file);
        });
    });

    // Lógica do Modal de Reset
    const resetModal = document.getElementById('reset-modal');
    const resetModalContent = document.getElementById('reset-modal-content');

    function openResetModal() {
        resetModal.classList.remove('opacity-0', 'pointer-events-none');
        resetModalContent.classList.replace('scale-95', 'scale-100');
    }

    function closeResetModal() {
        resetModal.classList.add('opacity-0', 'pointer-events-none');
        resetModalContent.classList.replace('scale-100', 'scale-95');
    }

    function resetToDefault() {
        if (confirm("Tem certeza? Esta ação substituirá sua grade pelo arquivo predefinido.")) {
            fetch('canais.json')
                .then(response => {
                    if (!response.ok) throw new Error('Network response was not ok');
                    return response.json();
                })
                .then(data => {
                    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
                    location.reload();
                })
                .catch(error => {
                    console.warn('Fallback aplicado na ausência do canais.json');
                    const fallbackData = [
                        { id: 1, name: 'Canal 1 - Aventuras', color: 'bg-red-500', programs: [] },
                        { id: 2, name: 'Canal 2 - Natureza', color: 'bg-blue-500', programs: [] },
                        { id: 3, name: 'Canal 3 - Histórias', color: 'bg-green-500', programs: [] }
                    ];
                    localStorage.setItem(STORAGE_KEY, JSON.stringify(fallbackData));
                    location.reload();
                });
        }
    }

    function clearAllChannels() {
        if (confirm("Tem certeza? Isso vai remover TODOS os programas, deixando os canais vazios.")) {
            const channels = JSON.parse(localStorage.getItem(STORAGE_KEY));
            channels.forEach(channel => {
                channel.programs = [];
            });
            localStorage.setItem(STORAGE_KEY, JSON.stringify(channels));
            location.reload();
        }
    }
</script>
</body>
</html>
