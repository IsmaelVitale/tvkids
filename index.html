
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart TV Kids - Início</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .modal-enter { opacity: 0; pointer-events: none; transition: opacity 0.3s ease; }
        .modal-active { opacity: 1; pointer-events: auto; }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-6 text-slate-200 m-0">

<h1 class="text-5xl font-black text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-blue-500 mb-16 tracking-tight text-center">
    Smart TV Kids
</h1>

<div class="flex flex-col md:flex-row gap-8 w-full max-w-4xl justify-center">
    <!-- CARD 1: ASSISTIR TV -->
    <a href="tv.html" class="flex-1 bg-gradient-to-br from-indigo-500 to-purple-600 rounded-3xl p-10 flex flex-col items-center justify-center cursor-pointer transform transition-all hover:scale-105 hover:shadow-[0_0_40px_rgba(99,102,241,0.5)] group text-decoration-none">
        <div class="text-white group-hover:animate-bounce mb-6">
            <svg xmlns="http://www.w3.org/2000/svg" width="80" height="80" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="7" width="20" height="15" rx="2" ry="2"></rect><polyline points="17 2 12 7 7 2"></polyline></svg>
        </div>
        <h2 class="text-3xl font-bold text-white text-center">Assistir TV</h2>
        <p class="text-indigo-100 mt-2 text-center text-lg">Ir para a programação</p>
    </a>

    <!-- CARD 2: AJUSTES DOS PAIS -->
    <div onclick="openPasswordModal()" class="flex-1 bg-slate-800 border-2 border-slate-700 rounded-3xl p-10 flex flex-col items-center justify-center cursor-pointer transform transition-all hover:scale-105 hover:border-slate-500 hover:shadow-xl group">
        <div class="text-slate-400 group-hover:text-white transition-colors mb-6 relative">
            <svg xmlns="http://www.w3.org/2000/svg" width="80" height="80" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"></path><circle cx="12" cy="12" r="3"></circle></svg>
            <div class="absolute -bottom-2 -right-2 bg-slate-800 rounded-full p-1 border-2 border-slate-700 text-amber-500">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
            </div>
        </div>
        <h2 class="text-3xl font-bold text-white text-center">Ajustes dos Pais</h2>
        <p class="text-slate-400 mt-2 text-center text-lg">Área restrita por senha</p>
    </div>
</div>

<!-- MODAL DE SENHA -->
<div id="password-modal" class="fixed inset-0 z-50 flex items-center justify-center bg-black/80 backdrop-blur-sm modal-enter">
    <div class="bg-slate-800 border border-slate-700 rounded-3xl p-8 max-w-sm w-full mx-4 shadow-2xl relative transform transition-transform scale-95" id="modal-content">
        <button onclick="closePasswordModal()" class="absolute top-4 right-4 text-slate-400 hover:text-white transition">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
        </button>
        <div class="flex justify-center mb-6 text-amber-500">
            <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
        </div>
        <h2 class="text-2xl font-bold text-center mb-2">Acesso Restrito</h2>
        <p class="text-slate-400 text-center mb-6 text-sm">Digite o PIN de acesso (010101) para gerenciar a TV.</p>
        <input type="password" id="pin-input" placeholder="••••••" class="w-full bg-slate-900 border border-slate-600 rounded-xl px-4 py-4 text-center text-2xl font-mono text-white tracking-widest focus:outline-none focus:border-blue-500 transition-all mb-4">
        <p id="pin-error" class="text-red-400 text-center text-sm mb-4 font-semibold hidden">Senha incorreta. Tente novamente.</p>
        <button onclick="verifyPassword()" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-4 rounded-xl transition-colors">
            Entrar
        </button>
    </div>
</div>

<script>
    document.addEventListener('DOMContentLoaded', () => {
        const STORAGE_KEY = 'tvKidsChannels';

        // Requisita o JSON inicial se o cache estiver vazio
        if (!localStorage.getItem(STORAGE_KEY)) {
            fetch('canais.json')
                .then(response => {
                    if (!response.ok) throw new Error('Falha ao carregar canais.json');
                    return response.json();
                })
                .then(data => {
                    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
                    console.log('Arquivo canais.json injetado no LocalStorage.');
                })
                .catch(error => {
                    console.error('Erro na requisição do JSON (Pode ser CORS local):', error);
                    // Fallback seguro de canais vazios
                    const fallbackData = [
                        { id: 1, name: 'Canal 1', color: 'bg-red-500', programs: [] },
                        { id: 2, name: 'Canal 2', color: 'bg-blue-500', programs: [] },
                        { id: 3, name: 'Canal 3', color: 'bg-green-500', programs: [] }
                    ];
                    localStorage.setItem(STORAGE_KEY, JSON.stringify(fallbackData));
                });
        }
    });

    // Autenticação
    const modal = document.getElementById('password-modal');
    const modalContent = document.getElementById('modal-content');
    const pinInput = document.getElementById('pin-input');
    const pinError = document.getElementById('pin-error');
    const SECRET_PIN = "010101";

    function openPasswordModal() {
        modal.classList.add('modal-active');
        modalContent.classList.replace('scale-95', 'scale-100');
        pinInput.value = '';
        pinError.classList.add('hidden');
        setTimeout(() => pinInput.focus(), 100);
    }

    function closePasswordModal() {
        modal.classList.remove('modal-active');
        modalContent.classList.replace('scale-100', 'scale-95');
    }

    function verifyPassword() {
        if (pinInput.value === SECRET_PIN) {
            window.location.href = 'settings.html';
        } else {
            pinError.classList.remove('hidden');
            pinInput.value = '';
            pinInput.focus();
            modalContent.classList.add('translate-x-2');
            setTimeout(() => modalContent.classList.replace('translate-x-2', '-translate-x-2'), 100);
            setTimeout(() => modalContent.classList.replace('-translate-x-2', 'translate-x-2'), 200);
            setTimeout(() => modalContent.classList.replace('translate-x-2', 'translate-x-0'), 300);
        }
    }

    pinInput.addEventListener('keypress', function (e) {
        if (e.key === 'Enter') verifyPassword();
    });
</script>
</body>
</html>
